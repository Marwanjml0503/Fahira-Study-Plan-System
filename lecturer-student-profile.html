<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Student Profile - Lecturer View | Raffles StudyPlan Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-core.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* Enhanced Theme Variables */
        :root {
            --bg-primary: #0a0c15;
            --bg-secondary: #05070f;
            --bg-card: rgba(18, 22, 35, 0.85);
            --bg-card-solid: #121623;
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --accent-primary: #ff6b35;
            --accent-secondary: #ff8c42;
            --accent-tertiary: #ffb347;
            --accent-glow: rgba(255, 107, 53, 0.25);
            --border-color: rgba(255, 255, 255, 0.08);
            --gradient-start: #0f1222;
            --gradient-end: #080b14;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.5);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.6);
            --shadow-xl: 0 25px 45px rgba(0,0,0,0.7);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #fef9f0;
            --bg-secondary: #fff5e8;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-solid: #ffffff;
            --text-primary: #2d2418;
            --text-secondary: #6b5a4a;
            --accent-primary: #e85d04;
            --accent-secondary: #f48c06;
            --accent-tertiary: #faa307;
            --accent-glow: rgba(232, 93, 4, 0.15);
            --border-color: rgba(0, 0, 0, 0.08);
            --gradient-start: #fff8f0;
            --gradient-end: #fff2e6;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.1);
            --shadow-xl: 0 25px 45px rgba(0,0,0,0.12);
        }

        /* Container */
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo span {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
        }

        nav a:hover, nav a.active {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            color: var(--accent-primary);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-md);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }

        /* Dashboard Container */
        .dashboard-container {
            padding: 32px;
        }

        /* Back Button */
        .back-btn {
            margin-bottom: 24px;
        }

        .btn-secondary {
            background: var(--bg-card-solid);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateX(-4px);
        }

        /* Profile Header */
        .profile-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 36px;
            border-radius: 28px;
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
            position: relative;
            box-shadow: var(--shadow-md);
        }

        .view-only-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .profile-name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .profile-id {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 107, 53, 0.15);
            color: var(--accent-primary);
        }

        .intake-badge {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        /* Profile Grid */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
            margin-top: 24px;
        }

        .profile-card {
            background: var(--bg-card-solid);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-md);
        }

        .profile-card h3 {
            color: var(--accent-primary);
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .profile-card h3 i {
            font-size: 1.2rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
            flex: 1;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.85rem;
            flex: 1;
            text-align: right;
        }

        .stat-highlight {
            font-size: 1rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 200px;
            padding: 14px 24px;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .action-btn.primary {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .action-btn.secondary {
            background: var(--bg-card-solid);
            color: var(--accent-primary);
            border: 1px solid var(--border-color);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        /* Loading & Error States */
        .loading {
            text-align: center;
            padding: 80px;
        }

        .loading i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 16px;
        }

        .error-message {
            text-align: center;
            padding: 60px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 28px;
            margin: 40px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .error-message i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .error-message button {
            margin-top: 24px;
            padding: 12px 28px;
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .hidden {
            display: none;
        }

        /* Footer */
        .footer {
            margin-top: 48px;
            padding: 32px 32px 24px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 24px;
        }

        .footer-section h4 {
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .footer-section h4 i {
            color: var(--accent-primary);
            margin-right: 8px;
        }

        .footer-section p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 20px;
            }
            .header {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }
            nav ul {
                justify-content: center;
            }
            .profile-header {
                padding: 24px;
            }
            .profile-name {
                font-size: 1.5rem;
            }
            .view-only-badge {
                position: static;
                display: inline-flex;
                margin-bottom: 16px;
            }
            .profile-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
            .action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <h1>StudyPlan<span>Portal</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="lecturer-dashboard.html">Dashboard</a></li>
                    <li><a href="lecturer-view-plan.html?course=DIT&plan=A">Course Plans</a></li>
                    <li><a href="lecturer-student-profile.html" class="active">Student Profile</a></li>
                    <li><button class="theme-toggle" onclick="toggleTheme()">
                        <i class="fas fa-moon"></i>
                        <span class="theme-text">Dark</span>
                    </button></li>
                    <li><button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button></li>
                </ul>
            </nav>
        </header>

        <div class="dashboard-container">
            <div class="back-btn">
                <button class="btn-secondary" onclick="window.location.href='lecturer-dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </button>
            </div>

            <div id="loading" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <div>Loading student profile...</div>
            </div>
            
            <div id="profileContent" class="hidden"></div>
        </div>

        <footer class="footer">
            <div class="footer-content">
                <div class="footer-section">
                    <h4><i class="fas fa-university"></i> Raffles StudyPlan Portal</h4>
                    <p>Lecturer View - Complete Student Profile</p>
                </div>
                <div class="footer-section">
                    <h4><i class="fas fa-calendar"></i> Current Date</h4>
                    <p id="currentDateDisplay"></p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Raffles StudyPlan Portal | Lecturer Mode | Empowering Education</p>
            </div>
        </footer>
    </div>

    <script>
        document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });

        function formatValue(value, defaultValue = 'Not specified') {
            if (!value || value === '' || value === 'null' || value === null) return defaultValue;
            return value;
        }

        function getIntakeDisplay(intakeYear, intakeMonth) {
            if (!intakeYear || !intakeMonth) return 'Unknown';
            
            const monthNames = {
                '01': 'January',
                '1': 'January',
                '05': 'May',
                '5': 'May',
                '09': 'September',
                '9': 'September'
            };
            
            const monthStr = intakeMonth.toString().padStart(2, '0');
            const monthName = monthNames[monthStr] || intakeMonth;
            return `${monthName} ${intakeYear}`;
        }

        // Fixed semester calculation based on current date
        function calculateCurrentSemester(intakeYear, intakeMonth) {
            if (!intakeYear || !intakeMonth) return 1;
            
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;
            const currentDay = now.getDate();
            
            const intakeYearNum = parseInt(intakeYear);
            const intakeMonthNum = parseInt(intakeMonth);
            
            // Define semester periods
            function getCurrentSemesterNumber() {
                // Sem 1: Jan 1 - Apr 15
                if (currentMonth === 1 || currentMonth === 2 || currentMonth === 3 || 
                    (currentMonth === 4 && currentDay <= 15)) {
                    return 1;
                }
                // Sem 2: May 15 - Aug 15
                else if ((currentMonth === 5 && currentDay >= 15) || currentMonth === 6 || currentMonth === 7 || 
                         (currentMonth === 8 && currentDay <= 15)) {
                    return 2;
                }
                // Sem 3: Sep 15 - Dec 31
                else if ((currentMonth === 9 && currentDay >= 15) || currentMonth === 10 || currentMonth === 11 || currentMonth === 12) {
                    return 3;
                }
                return 1;
            }
            
            function getIntakeSemesterNumber() {
                switch(intakeMonthNum) {
                    case 1: return 1;
                    case 5: return 2;
                    case 9: return 3;
                    default: return 1;
                }
            }
            
            const currentSemNum = getCurrentSemesterNumber();
            const intakeSemNum = getIntakeSemesterNumber();
            
            let totalSemestersCompleted = 0;
            
            if (currentYear === intakeYearNum) {
                totalSemestersCompleted = currentSemNum - intakeSemNum;
                if (totalSemestersCompleted < 0) totalSemestersCompleted = 0;
            } else {
                const yearsDiff = currentYear - intakeYearNum;
                const semestersAfterIntake = 3 - intakeSemNum;
                const fullYearsSemesters = (yearsDiff - 1) * 3;
                const currentYearSemesters = currentSemNum;
                totalSemestersCompleted = semestersAfterIntake + fullYearsSemesters + currentYearSemesters;
            }
            
            let currentSemester = intakeSemNum + totalSemestersCompleted;
            currentSemester = Math.max(1, Math.min(currentSemester, 12));
            
            return currentSemester;
        }

        (async function() {
            const loadingEl = document.getElementById('loading');
            const contentEl = document.getElementById('profileContent');
            
            try {
                if (!window.dataManager) {
                    throw new Error('System not initialized');
                }
                
                const currentUser = window.dataManager.getCurrentUser();
                
                if (!currentUser || currentUser.role !== 'lecturer') {
                    window.location.href = 'index.html';
                    return;
                }
                
                // Get student ID from URL
                const urlParams = new URLSearchParams(window.location.search);
                const studentId = urlParams.get('id');
                
                if (!studentId) {
                    window.location.href = 'lecturer-dashboard.html';
                    return;
                }
                
                console.log(`Loading profile for student: ${studentId}`);
                
                // First try to get student by ID directly
                let student = await window.dataManager.getUserByEmail(studentId);
                
                if (!student) {
                    // Fallback: get all students and find
                    const students = await window.dataManager.getAllStudents();
                    student = students.find(s => s.id === studentId || s.email === studentId);
                }
                
                if (!student) {
                    throw new Error(`Student ${studentId} not found`);
                }
                
                console.log('Found student:', student);
                
                // Get enrollment data
                let enrollment = await window.dataManager.getStudentEnrollment(student.id || student.email);
                
                if (!enrollment) {
                    // Try to get from student object if available
                    enrollment = student.enrollmentData || student.enrollment || null;
                }
                
                console.log('Enrollment data:', enrollment);
                
                // Get course details
                let course = enrollment?.courses || {};
                const courseId = enrollment?.course_id || student.course || 'DIT';
                
                // Define course info
                const courseInfo = {
                    'DIT': { full_name: 'Diploma in Information Technology', duration_years: 2, total_semesters: 6, total_credits: 90 },
                    'BIT': { full_name: 'Bachelor of Information Technology', duration_years: 3, total_semesters: 9, total_credits: 120 },
                    'BAI': { full_name: 'Bachelor of Artificial Intelligence', duration_years: 3, total_semesters: 9, total_credits: 120 },
                    'BDS': { full_name: 'Bachelor of Data Science', duration_years: 3, total_semesters: 9, total_credits: 120 }
                };
                
                const selectedCourse = courseInfo[courseId] || courseInfo['DIT'];
                
                // Get intake details
                const intakeYear = enrollment?.intake_year || student.intake_year || '2024';
                const intakeMonth = enrollment?.intake_month || student.intake_month || '01';
                const studyPlan = enrollment?.study_plan || student.study_plan || 'A';
                
                console.log(`Intake: ${intakeMonth}/${intakeYear}`);
                
                // Calculate current semester using the fixed function
                const currentSemester = calculateCurrentSemester(intakeYear, intakeMonth);
                const maxSemesters = selectedCourse.total_semesters;
                
                console.log(`Semester: ${currentSemester}/${maxSemesters}`);
                
                // Get student's module status
                const modules = await window.dataManager.getModuleStatus(student.id || student.email);
                console.log('Modules loaded:', modules ? modules.length : 0);
                
                // Calculate statistics
                const totalModules = modules ? modules.length : 0;
                const completedModules = modules ? modules.filter(m => m.status === 'completed').length : 0;
                const inProgressModules = modules ? modules.filter(m => m.status === 'in_progress' || m.status === 'in-progress').length : 0;
                const failedModules = modules ? modules.filter(m => m.status === 'failed').length : 0;
                
                const totalCredits = modules ? modules.reduce((sum, m) => sum + (m.credits || 0), 0) : 0;
                const earnedCredits = modules ? modules
                    .filter(m => m.status === 'completed')
                    .reduce((sum, m) => sum + (m.credits || 0), 0) : 0;
                
                const completionRate = totalModules > 0 ? Math.round((completedModules / totalModules) * 100) : 0;
                const semesterProgress = Math.min(100, Math.round((currentSemester / maxSemesters) * 100));
                
                const intakeDisplay = getIntakeDisplay(intakeYear, intakeMonth);
                
                // Build profile HTML with all student data
                contentEl.innerHTML = `
                    <div class="profile-header">
                        <span class="view-only-badge"><i class="fas fa-eye"></i> Lecturer View Only</span>
                        <h1 class="profile-name">${formatValue(student.name, 'Student Name')}</h1>
                        <div class="profile-id">
                            <i class="fas fa-id-card"></i> ${student.id || student.email}
                            <span class="badge">${courseId}</span>
                            <span class="badge intake-badge"><i class="fas fa-calendar"></i> ${intakeDisplay}</span>
                            <span class="badge">Plan ${studyPlan}</span>
                        </div>
                        
                        <div class="profile-grid">
                            <!-- Academic Information -->
                            <div class="profile-card">
                                <h3><i class="fas fa-graduation-cap"></i> Academic Information</h3>
                                <div class="info-row">
                                    <span class="info-label">Programme:</span>
                                    <span class="info-value">${selectedCourse.full_name}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Course Code:</span>
                                    <span class="info-value">${courseId}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Intake:</span>
                                    <span class="info-value"><strong style="color: var(--accent-primary);">${intakeDisplay}</strong></span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Study Plan:</span>
                                    <span class="info-value">Plan ${studyPlan}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Current Semester:</span>
                                    <span class="info-value"><span class="stat-highlight">${currentSemester}</span> / ${maxSemesters}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Semester Progress:</span>
                                    <span class="info-value">${semesterProgress}%</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Programme Duration:</span>
                                    <span class="info-value">${selectedCourse.duration_years} Years (${maxSemesters} Semesters)</span>
                                </div>
                            </div>
                            
                            <!-- Academic Progress -->
                            <div class="profile-card">
                                <h3><i class="fas fa-chart-line"></i> Academic Progress</h3>
                                <div class="info-row">
                                    <span class="info-label">Modules Completed:</span>
                                    <span class="info-value"><span class="stat-highlight">${completedModules}</span> / ${totalModules}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">In Progress:</span>
                                    <span class="info-value">${inProgressModules}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Failed:</span>
                                    <span class="info-value">${failedModules}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Credits Earned:</span>
                                    <span class="info-value"><span class="stat-highlight">${earnedCredits}</span> / ${selectedCourse.total_credits}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Completion Rate:</span>
                                    <span class="info-value"><span class="stat-highlight">${completionRate}%</span></span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Overall Progress:</span>
                                    <span class="info-value">${Math.round((earnedCredits / selectedCourse.total_credits) * 100)}%</span>
                                </div>
                            </div>
                            
                            <!-- Personal Information -->
                            <div class="profile-card">
                                <h3><i class="fas fa-user"></i> Personal Information</h3>
                                <div class="info-row">
                                    <span class="info-label">Full Name:</span>
                                    <span class="info-value">${formatValue(student.name)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Email:</span>
                                    <span class="info-value">${formatValue(student.email)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Gender:</span>
                                    <span class="info-value">${formatValue(student.gender)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Date of Birth:</span>
                                    <span class="info-value">${formatValue(student.date_of_birth)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Age:</span>
                                    <span class="info-value">${formatValue(student.age)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">IC/Passport:</span>
                                    <span class="info-value">${formatValue(student.ic_passport)}</span>
                                </div>
                            </div>
                            
                            <!-- Contact & Demographic -->
                            <div class="profile-card">
                                <h3><i class="fas fa-address-book"></i> Contact & Demographic</h3>
                                <div class="info-row">
                                    <span class="info-label">Mobile Number:</span>
                                    <span class="info-value">${formatValue(student.mobile_no)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Personal Email:</span>
                                    <span class="info-value">${formatValue(student.personal_email)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Nationality:</span>
                                    <span class="info-value">${formatValue(student.nationality)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Race:</span>
                                    <span class="info-value">${formatValue(student.race)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Religion:</span>
                                    <span class="info-value">${formatValue(student.religion)}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Student Type:</span>
                                    <span class="info-value">${formatValue(student.student_type, 'Local')}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="action-btn primary" onclick="window.open('personal-plan.html?student=${student.id || student.email}', '_blank')">
                                <i class="fas fa-calendar-alt"></i> View Study Plan
                            </button>
                            <button class="action-btn primary" onclick="window.open('studyplan.html?student=${student.id || student.email}', '_blank')">
                                <i class="fas fa-user-edit"></i> View Personal Plan
                            </button>
                            <button class="action-btn secondary" onclick="window.location.href='lecturer-dashboard.html'">
                                <i class="fas fa-arrow-left"></i> Back to Dashboard
                            </button>
                        </div>
                    </div>
                `;
                
                loadingEl.classList.add('hidden');
                contentEl.classList.remove('hidden');
                
            } catch (error) {
                console.error('Error:', error);
                loadingEl.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Profile</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()">
                            <i class="fas fa-sync-alt"></i> Try Again
                        </button>
                    </div>
                `;
            }
        })();

        // ====== THEME TOGGLE ======
        window.toggleTheme = function() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const icon = document.querySelector('.theme-toggle i');
            const text = document.querySelector('.theme-text');
            if (newTheme === 'light') {
                icon.className = 'fas fa-sun';
                text.textContent = 'Light';
            } else {
                icon.className = 'fas fa-moon';
                text.textContent = 'Dark';
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const icon = document.querySelector('.theme-toggle i');
            const text = document.querySelector('.theme-text');
            if (savedTheme === 'light') {
                icon.className = 'fas fa-sun';
                text.textContent = 'Light';
            } else {
                icon.className = 'fas fa-moon';
                text.textContent = 'Dark';
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', function() {
            if (window.dataManager) {
                window.dataManager.clearCurrentUser();
            }
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
