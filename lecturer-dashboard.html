<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lecturer Dashboard | Raffles StudyPlan Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-core.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* Enhanced Theme Variables */
        :root {
            --bg-primary: #0a0c15;
            --bg-secondary: #05070f;
            --bg-card: rgba(18, 22, 35, 0.85);
            --bg-card-solid: #121623;
            --text-primary: #ffffff;
            --text-secondary: #a0a8c0;
            --accent-primary: #ff6b35;
            --accent-secondary: #ff8c42;
            --accent-tertiary: #ffb347;
            --accent-glow: rgba(255, 107, 53, 0.25);
            --border-color: rgba(255, 255, 255, 0.08);
            --gradient-start: #0f1222;
            --gradient-end: #080b14;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.5);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.6);
            --shadow-xl: 0 25px 45px rgba(0,0,0,0.7);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #fef9f0;
            --bg-secondary: #fff5e8;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-solid: #ffffff;
            --text-primary: #2d2418;
            --text-secondary: #6b5a4a;
            --accent-primary: #e85d04;
            --accent-secondary: #f48c06;
            --accent-tertiary: #faa307;
            --accent-glow: rgba(232, 93, 4, 0.15);
            --border-color: rgba(0, 0, 0, 0.08);
            --gradient-start: #fff8f0;
            --gradient-end: #fff2e6;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.1);
            --shadow-xl: 0 25px 45px rgba(0,0,0,0.12);
        }

        /* Main Container */
        .dashboard-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo span {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
        }

        nav a:hover, nav a.active {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            color: var(--accent-primary);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-md);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25);
            transform: translateY(-2px);
        }

        /* Dashboard Header */
        .dashboard-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 32px;
            border-radius: 28px;
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .dashboard-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .dashboard-header h2 i {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-right: 12px;
        }

        .dashboard-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-top: 28px;
        }

        .stat-card {
            background: var(--bg-card-solid);
            padding: 24px 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-lg);
        }

        .stat-card h3 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .stat-card p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card h3 {
            margin-bottom: 24px;
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Search Box */
        .search-box {
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-card-solid);
            border: 1.5px solid var(--border-color);
            border-radius: 60px;
            color: var(--text-primary);
            font-size: 0.9rem;
            margin-bottom: 24px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-box::placeholder {
            color: var(--text-secondary);

        }

            flex-wrap: wrap;

            color: var(--text-secondary);
            border: 1.5px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .filter-btn.active {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* Table Styles */
        .students-table-container {
            overflow-x: auto;
            border-radius: 20px;
        }

        .students-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1300px;
        }

        .students-table thead {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 16px;
        }

        .students-table th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            white-space: nowrap;
        }

        .students-table th i {
            margin-right: 8px;
        }

        .students-table tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .students-table tbody tr:hover {
            background: var(--accent-glow);
            transform: scale(1.01);
        }

        .students-table td {
            padding: 14px 12px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .serial-no {
            font-weight: 600;
            color: var(--text-secondary);
            width: 50px;
        }

        .student-name {
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .student-id {
            font-family: monospace;
            font-weight: 500;
            font-size: 0.8rem;
        }

        /* Programme Badges */
        .programme-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .programme-dit { background: rgba(255, 107, 53, 0.2); color: #ff6b35; }
        .programme-bit { background: rgba(255, 140, 66, 0.2); color: #ff8c42; }
        .programme-bai { background: rgba(255, 179, 71, 0.2); color: #ffb347; }
        .programme-bds { background: rgba(100, 255, 218, 0.2); color: #64ffda; }
        
        [data-theme="light"] .programme-dit { background: rgba(232, 93, 4, 0.15); color: #e85d04; }
        [data-theme="light"] .programme-bit { background: rgba(244, 140, 6, 0.15); color: #f48c06; }
        [data-theme="light"] .programme-bai { background: rgba(250, 163, 7, 0.15); color: #faa307; }
        [data-theme="light"] .programme-bds { background: rgba(44, 95, 110, 0.15); color: #2c5f6e; }

        /* Progress Bars */
        .progress-bar-container {
            width: 100px;
            height: 6px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin: 6px 0;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
        }
        
        .progress-text {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .credits-badge {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            background: var(--bg-card-solid);
            color: var(--accent-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
        }
        
        .action-btn:hover {
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            transform: translateY(-2px);
            border-color: transparent;
        }
        
        .profile-btn {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .profile-btn:hover {
            background: linear-gradient(105deg, #22c55e, #16a34a);
            color: white;
        }

        .intake-badge {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 80px;
        }
        
        .loading-spinner i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 16px;
        }

        .hidden {
            display: none;
        }

        .error-message {
            text-align: center;
            padding: 60px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 28px;
            margin: 40px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .error-message i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 20px;
        }
        
        .error-message button {
            margin-top: 24px;
            padding: 12px 28px;
            background: linear-gradient(105deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            margin-top: 48px;
            padding: 32px 32px 24px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            border-radius: 28px 28px 0 0;
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 32px;
            margin-bottom: 24px;
        }
        
        .footer-section h4 {
            margin-bottom: 12px;
            font-size: 1rem;
        }
        
        .footer-section h4 i {
            color: var(--accent-primary);
            margin-right: 8px;
        }
        
        .footer-section p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .footer-bottom {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 16px;
            }
            .header {
                flex-direction: column;
                gap: 16px;
                padding: 16px;
            }
            nav ul {
                justify-content: center;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 550px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            }

</head>

<script>
document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('en-US', { 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric' 
});

let allStudents = [];
let allModuleStatus = [];
let currentFilter = 'all';
let currentUser = null;

// ============================================
// FIXED SEMESTER CALCULATION BASED ON ACADEMIC CALENDAR
// ============================================
function calculateCurrentSemester(intakeYear, intakeMonth) {
    if (!intakeYear || !intakeMonth) return 1;
    
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1; // 1-12
    const currentDay = now.getDate();
    
    // Parse intake
    const intakeYearNum = parseInt(intakeYear);
    const intakeMonthNum = parseInt(intakeMonth);
    
    // Define semester periods
    // Sem 1: Jan 1 - Apr 15
    // Sem 2: May 15 - Aug 15
    // Sem 3: Sep 15 - Dec 31
    
    function getCurrentSemesterNumber() {
        // Check if current date is in Sem 1 (Jan 1 - Apr 15)
        if (currentMonth === 1 || 
            (currentMonth === 2) || 
            (currentMonth === 3) || 
            (currentMonth === 4 && currentDay <= 15)) {
            return 1;
        }
        // Check if current date is in Sem 2 (May 15 - Aug 15)
        else if ((currentMonth === 5 && currentDay >= 15) || 
                 currentMonth === 6 || 
                 currentMonth === 7 || 
                 (currentMonth === 8 && currentDay <= 15)) {
            return 2;
        }
        // Check if current date is in Sem 3 (Sep 15 - Dec 31)
        else if ((currentMonth === 9 && currentDay >= 15) || 
                 currentMonth === 10 || 
                 currentMonth === 11 || 
                 currentMonth === 12) {
            return 3;
        }
        // Default to Sem 1
        return 1;
    }
    
    function getIntakeSemesterNumber() {
        switch(intakeMonthNum) {
            case 1: return 1;  // January intake -> Semester 1
            case 5: return 2;  // May intake -> Semester 2
            case 9: return 3;  // September intake -> Semester 3
            default: return 1;
        }
    }
    
    const currentSemNum = getCurrentSemesterNumber();
    const intakeSemNum = getIntakeSemesterNumber();
    
    // Calculate total semesters completed since intake
    let totalSemestersCompleted = 0;
    
    if (currentYear === intakeYearNum) {
        // Same year as intake
        totalSemestersCompleted = currentSemNum - intakeSemNum;
        if (totalSemestersCompleted < 0) totalSemestersCompleted = 0;
    } else {
        // Different year
        const yearsDiff = currentYear - intakeYearNum;
        
        // Semesters in intake year after intake
        const semestersAfterIntake = 3 - intakeSemNum;
        
        // Full years in between (each year has 3 semesters)
        const fullYearsSemesters = (yearsDiff - 1) * 3;
        
        // Semesters in current year up to now
        const currentYearSemesters = currentSemNum;
        
        totalSemestersCompleted = semestersAfterIntake + fullYearsSemesters + currentYearSemesters;
    }
    
    // Current semester = intake semester + total semesters completed
    let currentSemester = intakeSemNum + totalSemestersCompleted;
    
    // Ensure minimum of 1
    currentSemester = Math.max(1, currentSemester);
    
    return currentSemester;
}

// Test the function
console.log("Semester Calculation Test:");
console.log("Today's date:", new Date().toLocaleDateString());
console.log("Jan 2024 intake -> Sem:", calculateCurrentSemester(2024, 1));
console.log("May 2024 intake -> Sem:", calculateCurrentSemester(2024, 5));
console.log("Sep 2024 intake -> Sem:", calculateCurrentSemester(2024, 9));

// Helper functions
function calculateStudentProgress(modules) {
    if (!modules || modules.length === 0) {
        return { completed: 0, total: 0, percentage: 0, credits: 0 };
    }
    
    const completed = modules.filter(m => m.status === 'completed').length;
    const total = modules.length;
    const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
    const credits = modules
        .filter(m => m.status === 'completed')
        .reduce((sum, m) => sum + (m.credits || 0), 0);
    
    return { completed, total, percentage, credits };
}

function getStudentCourse(student) {
    if (student.course) return student.course;
    if (student.enrollmentData?.course_id) return student.enrollmentData.course_id;
    return 'DIT';
}

function getIntakeDisplay(intakeYear, intakeMonth) {
    if (!intakeYear || !intakeMonth) return 'Unknown';
    const monthNames = { '01': 'Jan', '1': 'Jan', '05': 'May', '5': 'May', '09': 'Sep', '9': 'Sep' };
    const monthStr = intakeMonth.toString().padStart(2, '0');
    return `${monthNames[monthStr] || monthStr} ${intakeYear}`;
}

function getProgrammeClass(courseId) {
    switch(courseId) {
        case 'DIT': return 'programme-dit';
        case 'BIT': return 'programme-bit';
        case 'BAI': return 'programme-bai';
        case 'BDS': return 'programme-bds';
        default: return 'programme-dit';
    }
}

function getTotalSemesters(courseId) {
    switch(courseId) {
        case 'DIT': return 6;
        case 'BIT': return 9;
        case 'BAI': return 9;
        case 'BDS': return 9;
        default: return 6;
    }
}

function getSemesterName(semesterNumber) {
    const semMap = {
        1: 'Jan-Apr',
        2: 'May-Aug',
        3: 'Sep-Dec',
        4: 'Jan-Apr',
        5: 'May-Aug',
        6: 'Sep-Dec',
        7: 'Jan-Apr',
        8: 'May-Aug',
        9: 'Sep-Dec'
    };
    return semMap[semesterNumber] || 'Semester';
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Filter functions
window.setFilter = function(filter) {
    currentFilter = filter;
    const buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.includes(filter) || (filter === 'all' && btn.textContent.includes('All'))) {
            btn.classList.add('active');
        }
    });
    filterStudents();
};

window.filterStudents = function() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return;
    
    const searchTerm = searchInput.value.toLowerCase();
    const rows = document.querySelectorAll('#studentTableBody tr');
    
    rows.forEach(row => {
        const course = row.dataset.course;
        const name = row.dataset.name || '';
        const id = row.dataset.idSearch || '';
        
        const matchesSearch = searchTerm === '' || 
            name.includes(searchTerm) || 
            id.includes(searchTerm) ||
            (course && course.toLowerCase().includes(searchTerm));
        
        let matchesFilter = true;
        if (currentFilter !== 'all') {
            matchesFilter = course === currentFilter;
        }
        
        row.style.display = (matchesSearch && matchesFilter) ? '' : 'none';
    });
};

// Navigation
window.viewStudentProfile = function(studentId) {
    window.open(`lecturer-student-profile.html?id=${encodeURIComponent(studentId)}`, '_blank');
};

window.viewStudentPlan = function(studentId) {
    window.open(`personal-plan.html?student=${encodeURIComponent(studentId)}`, '_blank');
};

// Theme toggle
window.toggleTheme = function() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    
    const icon = document.querySelector('.theme-toggle i');
    const text = document.querySelector('.theme-text');
    if (newTheme === 'light') {
        icon.className = 'fas fa-sun';
        text.textContent = 'Light';
    } else {
        icon.className = 'fas fa-moon';
        text.textContent = 'Dark';
    }
};

// Display dashboard
function displayLecturerDashboard(modulesByStudent) {
    const totalStudents = allStudents.length;
    
    // Count by course
    const ditStudents = allStudents.filter(s => getStudentCourse(s) === 'DIT');
    const bitStudents = allStudents.filter(s => getStudentCourse(s) === 'BIT');
    const baiStudents = allStudents.filter(s => getStudentCourse(s) === 'BAI');
    const bdsStudents = allStudents.filter(s => getStudentCourse(s) === 'BDS');
    
    const dashboardHtml = `
        <div class="dashboard-header">
            <h2><i class="fas fa-chalkboard-user"></i> Lecturer Dashboard</h2>
            <p>Welcome back, ${escapeHtml(currentUser?.name || currentUser?.email || 'Lecturer')}</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>${totalStudents}</h3>
                    <p><i class="fas fa-users"></i> Total Students</p>
                </div>
                <div class="stat-card">
                    <h3>${ditStudents.length}</h3>
                    <p><i class="fas fa-code"></i> DIT</p>
                </div>
                <div class="stat-card">
                    <h3>${bitStudents.length}</h3>
                    <p><i class="fas fa-laptop-code"></i> BIT</p>
                </div>
                <div class="stat-card">
                    <h3>${baiStudents.length}</h3>
                    <p><i class="fas fa-robot"></i> BAI</p>
                </div>
                <div class="stat-card">
                    <h3>${bdsStudents.length}</h3>
                    <p><i class="fas fa-database"></i> BDS</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-users-viewfinder"></i> Student Directory</h3>
            
            <input type="text" id="searchInput" class="search-box" 
                placeholder="🔍 Search by name, student ID, or programme..." onkeyup="filterStudents()">
            
            <div class="filter-options">
                <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" 
                    onclick="setFilter('all')"><i class="fas fa-globe"></i> All (${totalStudents})</button>
                <button class="filter-btn ${currentFilter === 'DIT' ? 'active' : ''}" 
                    onclick="setFilter('DIT')"><i class="fas fa-code"></i> DIT (${ditStudents.length})</button>
                <button class="filter-btn ${currentFilter === 'BIT' ? 'active' : ''}" 
                    onclick="setFilter('BIT')"><i class="fas fa-laptop-code"></i> BIT (${bitStudents.length})</button>
                <button class="filter-btn ${currentFilter === 'BAI' ? 'active' : ''}" 
                    onclick="setFilter('BAI')"><i class="fas fa-robot"></i> BAI (${baiStudents.length})</button>
                <button class="filter-btn ${currentFilter === 'BDS' ? 'active' : ''}" 
                    onclick="setFilter('BDS')"><i class="fas fa-database"></i> BDS (${bdsStudents.length})</button>
            </div>
            
            <div class="students-table-container">
                <table class="students-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th><i class="fas fa-user"></i> Student Name</th>
                            <th><i class="fas fa-id-card"></i> Student ID</th>
                            <th><i class="fas fa-graduation-cap"></i> Programme</th>
                            <th><i class="fas fa-calendar-alt"></i> Intake</th>
                            <th><i class="fas fa-chart-line"></i> Current Semester</th>
                            <th><i class="fas fa-layer-group"></i> Module Completion</th>
                            <th><i class="fas fa-credit-card"></i> Credits Earned</th>
                            <th><i class="fas fa-cog"></i> Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        ${allStudents.map((student, index) => {
                            const studentId = student.id || student.email;
                            const courseId = getStudentCourse(student);
                            const programmeClass = getProgrammeClass(courseId);
                            
                            const studentModules = modulesByStudent[studentId] || [];
                            const progress = calculateStudentProgress(studentModules);
                            
                            const enrollment = student.enrollmentData;
                            
                            let intakeYear = enrollment?.intake_year;
                            let intakeMonth = enrollment?.intake_month;
                            
                            if (!intakeYear) {
                                intakeYear = '2024';
                                intakeMonth = '01';
                            }
                            
                            // Use the fixed semester calculation
                            const currentSemester = calculateCurrentSemester(intakeYear, intakeMonth);
                            const totalSemesters = getTotalSemesters(courseId);
                            const semesterProgress = Math.min(100, Math.round((currentSemester / totalSemesters) * 100));
                            const semesterName = getSemesterName(currentSemester);
                            
                            const intakeDisplay = getIntakeDisplay(intakeYear, intakeMonth);
                            const studentName = student.name || 'Unknown';
                            const studentIdDisplay = studentId || 'N/A';
                            
                            return `
                                <tr data-id="${escapeHtml(studentIdDisplay)}" data-course="${courseId}" 
                                    data-name="${(studentName || '').toLowerCase()}" 
                                    data-id-search="${(studentIdDisplay || '').toLowerCase()}">
                                    <td class="serial-no">${index + 1}</td>
                                    <td class="student-name"><i class="fas fa-user-circle"></i> ${escapeHtml(studentName)}</td>
                                    <td class="student-id">${escapeHtml(studentIdDisplay)}</td>
                                    <td><span class="programme-badge ${programmeClass}">${courseId}</span></td>
                                    <td><span class="intake-badge"><i class="fas fa-calendar"></i> ${intakeDisplay}</span></td>
                                    <td>
                                        <div><strong>Sem ${currentSemester}/${totalSemesters}</strong> <span style="font-size:0.7rem;">(${semesterName})</span></div>
                                        <div class="progress-bar-container">
                                            <div class="progress-bar-fill" style="width: ${semesterProgress}%"></div>
                                        </div>
                                        <div class="progress-text">${semesterProgress}% of programme</div>
                                    </td>
                                    <td>
                                        <div><strong>${progress.completed}/${progress.total}</strong> modules</div>
                                        <div class="progress-bar-container">
                                            <div class="progress-bar-fill" style="width: ${progress.percentage}%"></div>
                                        </div>
                                        <div class="progress-text">${progress.percentage}% completed</div>
                                    </td>
                                    <td><span class="credits-badge"><i class="fas fa-star"></i> ${progress.credits}</span></td>
                                    <td>
                                        <div class="action-buttons">
                                            <button class="action-btn" onclick="viewStudentPlan('${escapeHtml(studentIdDisplay)}')">
                                                <i class="fas fa-eye"></i> Plan
                                            </button>
                                            <button class="action-btn profile-btn" onclick="viewStudentProfile('${escapeHtml(studentIdDisplay)}')">
                                                <i class="fas fa-user"></i> Profile
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
            
            ${allStudents.length === 0 ? '<div class="no-data"><i class="fas fa-database"></i><p>No students found in the database</p></div>' : ''}
        </div>
    `;
    
    document.getElementById('lecturerContent').innerHTML = dashboardHtml;
}

// Initialize dashboard
async function initDashboard() {
    const loadingEl = document.getElementById('loading');
    const contentEl = document.getElementById('lecturerContent');
    
    try {
        // Wait for dataManager to be available
        if (!window.dataManager) {
            console.log('Waiting for dataManager to initialize...');
            await new Promise(resolve => {
                if (window.dataManager) {
                    resolve();
                } else {
                    window.addEventListener('supabaseCoreReady', resolve, { once: true });
                    setTimeout(resolve, 3000);
                }
            });
        }
        
        console.log('DataManager is ready:', !!window.dataManager);
        
        currentUser = window.dataManager.getCurrentUser();
        console.log('Current user:', currentUser);
        
        if (!currentUser || currentUser.role !== 'lecturer') {
            console.error('No lecturer logged in, redirecting...');
            window.location.href = 'index.html';
            return;
        }
        
        console.log('Loading students...');
        allStudents = await window.dataManager.getAllStudents();
        console.log(`Found ${allStudents.length} students`);
        
        if (allStudents.length > 0) {
            console.log('Sample student:', allStudents[0]);
            
            // Load module status for all students
            const studentEmails = allStudents.map(s => s.id || s.email);
            
            const { data: allModules, error: modulesError } = await window.dbManager.supabase
                .from('module_status')
                .select('*')
                .in('student_id', studentEmails);
            
            if (modulesError) {
                console.error('Error loading modules:', modulesError);
                allModuleStatus = [];
            } else {
                allModuleStatus = allModules || [];
                console.log(`Loaded ${allModuleStatus.length} module records`);
            }
        } else {
            allModuleStatus = [];
        }
        
        // Group modules by student
        const modulesByStudent = {};
        allModuleStatus.forEach(module => {
            if (!modulesByStudent[module.student_id]) {
                modulesByStudent[module.student_id] = [];
            }
            modulesByStudent[module.student_id].push(module);
        });
        
        displayLecturerDashboard(modulesByStudent);
        
        loadingEl.classList.add('hidden');
        contentEl.classList.remove('hidden');
        
    } catch (error) {
        console.error('Dashboard error:', error);
        loadingEl.innerHTML = `
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Error Loading Dashboard</h3>
                <p>${error.message}</p>
                <button onclick="location.reload()"><i class="fas fa-sync-alt"></i> Try Again</button>
            </div>
        `;
    }
}

// Initialize theme
(function initTheme() {
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
})();

// Logout functionality
document.getElementById('logoutBtn').addEventListener('click', function() {
    if (window.dataManager && window.dataManager.clearCurrentUser) {
        window.dataManager.clearCurrentUser();
    }
    window.location.href = 'index.html';
});

// Start the dashboard
initDashboard();
</script>
